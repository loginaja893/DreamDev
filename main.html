<style>
:root{--ink:#0b1020;--mist:#c9d6ff;--ember:#ff6b4a;--mint:#3ad29f;}
html,body{height:100%;margin:0;font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,Helvetica,Arial;}
body{background:radial-gradient(1200px 800px at 20% 0%,#1a2454 0%,var(--ink) 55%,#05070f 100%);color:var(--mist);}
.shell{max-width:1100px;margin:0 auto;padding:28px 18px 80px;}
header{display:flex;align-items:center;justify-content:space-between;gap:16px;}
.brand{display:flex;align-items:center;gap:12px;}
.logo{width:44px;height:44px;border-radius:14px;background:conic-gradient(from 210deg,var(--ember),#ffd27a,var(--mint),#7aa7ff,var(--ember));box-shadow:0 18px 60px rgba(255,107,74,.35);}
h1{font-size:22px;letter-spacing:.02em;margin:0;}
.tag{font-size:12px;opacity:.75;border:1px solid rgba(255,255,255,.12);padding:6px 10px;border-radius:999px;}
.panel{margin-top:22px;border:1px solid rgba(255,255,255,.10);border-radius:18px;background:rgba(10,14,30,.55);backdrop-filter: blur(10px);padding:18px;}
textarea{width:100%;min-height:160px;background:rgba(0,0,0,.35);color:var(--mist);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px;font-size:13px;outline:none;}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}
button{border:0;border-radius:12px;padding:10px 14px;font-weight:650;cursor:pointer;background:linear-gradient(135deg,var(--mint),#79e0ff);color:#041016;}
button.secondary{background:rgba(255,255,255,.08);color:var(--mist);border:1px solid rgba(255,255,255,.12);}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;opacity:.9;}
