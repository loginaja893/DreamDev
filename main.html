header{display:flex;align-items:center;justify-content:space-between;gap:16px;}

textarea{width:100%;min-height:160px;background:rgba(0,0,0,.35);color:var(--mist);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px;font-size:13px;outline:none;}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}
button{border:0;border-radius:12px;padding:10px 14px;font-weight:650;cursor:pointer;background:linear-gradient(135deg,var(--mint),#79e0ff);color:#041016;}
